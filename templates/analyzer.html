<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics | Smart Content Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#eff6ff',
              100: '#dbeafe',
              500: '#3b82f6',
              600: '#2563eb',
            },
            slate: {
              850: '#151f32',
              900: '#0f172a',
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #0f172a;
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body class="antialiased flex h-screen overflow-hidden selection:bg-brand-500 selection:text-white">

  <!-- SIDEBAR -->
  <aside class="w-64 border-r border-slate-800 bg-slate-900/50 flex flex-col hidden md:flex">
    <div class="h-16 flex items-center px-6 border-b border-slate-800">
      <div class="flex items-center gap-2">
        <div class="w-6 h-6 rounded bg-brand-500 flex items-center justify-center text-white font-bold">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        </div>
        <span class="font-semibold text-white tracking-tight">Studio</span>
      </div>
    </div>

    <nav class="flex-1 px-4 py-6 space-y-1 overflow-y-auto">
      <a href="/" class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-lg text-slate-400 hover:text-white hover:bg-slate-800/50 transition-colors">
        <svg class="w-5 h-5 opacity-75" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
        Home
      </a>
      <a href="/dashboard" class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-lg text-slate-400 hover:text-white hover:bg-slate-800/50 transition-colors">
        <svg class="w-5 h-5 opacity-75" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
        Dashboard
      </a>
      <a href="/generator" class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-lg text-slate-400 hover:text-white hover:bg-slate-800/50 transition-colors">
        <svg class="w-5 h-5 opacity-75" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
        Ideas
      </a>
      <a href="/analyzer" class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-lg bg-slate-800 text-white transition-colors">
        <svg class="w-5 h-5 opacity-75" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
        Analytics
      </a>
      <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-lg text-slate-400 hover:text-white hover:bg-slate-800/50 transition-colors">
        <svg class="w-5 h-5 opacity-75" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
        Trends
      </a>
    </nav>

    <div class="p-4 border-t border-slate-800">
      <a href="#" class="flex items-center gap-3 px-3 py-2 text-sm font-medium rounded-lg text-slate-400 hover:text-white hover:bg-slate-800/50 transition-colors">
        <svg class="w-5 h-5 opacity-75" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        Settings
      </a>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
    
    <!-- TOP NAVBAR -->
    <header class="h-16 border-b border-slate-800 bg-slate-900/50 flex items-center justify-between px-8">
      <div class="flex-1 flex items-center">
        <div class="relative w-full max-w-md">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
          <input type="text" placeholder="Search..." class="w-full bg-slate-850 border border-slate-800 text-sm text-slate-300 rounded-lg pl-10 pr-4 py-2 focus:outline-none focus:border-slate-700 focus:ring-1 focus:ring-slate-700 transition-colors placeholder-slate-500">
        </div>
      </div>
      <div class="flex items-center gap-4">
        <button class="text-slate-400 hover:text-white transition-colors relative">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
          <span class="absolute top-0 right-0 w-2 h-2 bg-brand-500 rounded-full"></span>
        </button>
        <div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center border border-slate-700 overflow-hidden">
           <img src="https://api.dicebear.com/7.x/notionists/svg?seed=Nandana" alt="Profile" class="w-full h-full object-cover">
        </div>
      </div>
    </header>

    <!-- CONTENT AREA -->
    <div class="flex-1 overflow-y-auto p-8">
      
      <div class="max-w-xl mx-auto">
        <div class="mb-8">
          <h1 class="text-2xl font-bold text-white mb-2">Post Analyzer</h1>
          <p class="text-slate-400 text-sm">Calculate the engagement rate of your recent posts.</p>
        </div>

        <div class="bg-slate-850 border border-slate-800 p-8 rounded-2xl shadow-sm mb-6">
          <div class="space-y-5 mb-8">
            <div>
              <label for="likes" class="block text-sm font-medium text-slate-300 mb-1.5">Likes</label>
              <input type="number" id="likes" placeholder="e.g. 1200" class="w-full bg-slate-900 border border-slate-700 text-slate-300 text-sm rounded-lg px-4 py-2.5 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-colors placeholder-slate-600">
            </div>
            <div>
              <label for="comments" class="block text-sm font-medium text-slate-300 mb-1.5">Comments</label>
              <input type="number" id="comments" placeholder="e.g. 85" class="w-full bg-slate-900 border border-slate-700 text-slate-300 text-sm rounded-lg px-4 py-2.5 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-colors placeholder-slate-600">
            </div>
            <div>
              <label for="followers" class="block text-sm font-medium text-slate-300 mb-1.5">Total Followers</label>
              <input type="number" id="followers" placeholder="e.g. 15000" class="w-full bg-slate-900 border border-slate-700 text-slate-300 text-sm rounded-lg px-4 py-2.5 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-colors placeholder-slate-600">
            </div>
          </div>

          <button onclick="analyze()" class="w-full py-3 bg-brand-500 text-white text-sm font-medium rounded-lg hover:bg-brand-600 transition-colors shadow-sm shadow-brand-500/25 flex items-center justify-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
            Analyze Performance
          </button>
          
          <div id="result" class="mt-6 text-center text-sm font-medium hidden">
          </div>
        </div>
      </div>

    </div>
  </main>

  <script>
    function analyze() {
      const likes = document.getElementById('likes').value;
      const comments = document.getElementById('comments').value;
      const followers = document.getElementById('followers').value;
      
      if (!likes || !comments || !followers) return;

      fetch('/analyze', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          likes: likes,
          comments: comments,
          followers: followers
        })
      })
      .then(res => res.json())
      .then(data => {
        const resultDiv = document.getElementById('result');
        resultDiv.classList.remove('hidden');
        
        let colorClass = 'text-brand-400';
        if(data.status.toLowerCase().includes('good') || data.status.toLowerCase().includes('high')) {
            colorClass = 'text-emerald-400';
        } else if (data.status.toLowerCase().includes('low')) {
            colorClass = 'text-amber-400';
        }

        resultDiv.className = `mt-6 text-center text-sm font-medium p-4 rounded-lg bg-slate-900 border border-slate-800 ${colorClass}`;
        resultDiv.innerHTML = `Engagement Rate: <span class="text-lg ml-1">${data.engagement}%</span> <br/><span class="text-slate-400 text-xs font-normal mt-1 inline-block">Status: ${data.status}</span>`;
      });
    }
  </script>

</body>
</html>
